<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login · AI Business Co-Founder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <span class="brand-mark">AI</span>
        <span class="brand-text">Business Co-Founder</span>
      </a>
      <div id="userArea" class="user-area"></div>
    </div>
  </header>

  <main class="container auth-page">
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="muted">Login to access the Demo dashboard.</p>

        <form id="loginForm">
          <label class="field">
            <span>Email</span>
            <input id="loginEmail" type="email" placeholder="you@example.com" required>
          </label>

          <label class="field">
            <span>Password</span>
            <input id="loginPass" type="password" placeholder="••••••••" required>
          </label>

          <div id="loginError" class="form-error" style="display:none;"></div>

          <button class="btn primary" type="submit">Login</button>
          <p class="muted small">
            Don’t have an account? <a href="signup.html">Create one</a>
          </p>
        </form>
      </div>

      <div class="auth-side">
        <div class="side-card">
          <h3>After login</h3>
          <p class="muted">You will be redirected directly to <b>demo.html</b>.</p>
          <ul class="checklist">
            <li>Upload business files</li>
            <li>Ask questions</li>
            <li>Manage demo data</li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <small>© <span id="year"></span> AI Business Co-Founder</small>
      <small class="muted">Demo auth (localStorage)</small>
    </div>
  </footer>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
